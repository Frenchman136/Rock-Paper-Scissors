<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">
        <h1>Rock Paper Scissors</h1>
        <div class="choices">
            <button class="choices-btn" data-choice="rock">Rock</button>
            <button class="choices-btn" data-choice="paper">Paper</button>
            <button class="choices-btn" data-choice="scissors">Scissors</button>
        </div>

        <div class="result-container">
            <p id="result-text">Make your choice!</p>
            <p id="choices-display"></p>
        </div>

        <div class="score">
            <p>Player: <span id="player-score">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
            <p>Ties: <span id="tie-score">0</span></p>
        </div>

        <button id="reset-btn">Reset Game</button>
   </div> 

   <script src="index.js"></script>
</body>
</html>
